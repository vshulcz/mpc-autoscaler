replicaCount: 2

image:
  repository: ghcr.io/vshulcz/toy-load
  tag: "main"
  # digest pins the image by content; takes precedence over tag when set.
  # Recommended for reproducible deploys (e.g. "sha256:deadbeef...").
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

# Disable the default token mount; the workload makes no Kubernetes API calls.
automountServiceAccountToken: false

# Must exceed config.shutdownTimeout so the kubelet does not SIGKILL the pod
# before in-flight /work requests drain. Default leaves ~5s margin over 25s.
terminationGracePeriodSeconds: 30

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http

config:
  port: 9090
  metricsPath: /metrics
  readTimeout: 5s
  readHeaderTimeout: 5s
  writeTimeout: 20s
  idleTimeout: 60s
  shutdownTimeout: 25s
  maxHeaderBytes: 1048576
  maxQueryIDBytes: 256
  logLevel: info
  appName: toy-load

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 12
  targetCPUUtilizationPercentage: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

# Minimum number of pods that must stay available during voluntary disruption.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policy restricting ingress to the HTTP port.
# Default ingress is open from any namespace; refine via from[] for stricter posture.
networkPolicy:
  enabled: false
  ingress:
    from: []   # e.g. [{ namespaceSelector: { matchLabels: { name: monitoring } } }]

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2

readinessProbe:
  path: /readyz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

prometheusOperator:
  enabled: false
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    namespace: ""
  podMonitor:
    enabled: false
    interval: 30s
    namespace: ""

dashboard:
  enabled: false
  namespace: ""
