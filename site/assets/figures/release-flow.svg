<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Release workflow preview</title>
  <desc id="desc">The release workflow creates assets, publishes a GHCR image, attaches checksums, and publishes a GitHub Release.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101a33"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60e6a8"/>
    </marker>
  </defs>
  <rect width="980" height="420" rx="28" fill="url(#bg)"/>
  <text x="52" y="70" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="30" font-weight="800">v0.1.0 release lane</text>
  <text x="52" y="100" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="16">Tag Release dispatches Release, which owns binary, Helm, checksum, and GHCR publishing.</text>
  <g fill="none" stroke="#60e6a8" stroke-width="3" marker-end="url(#arrow)">
    <path d="M202 228 H298"/>
    <path d="M420 228 H516"/>
    <path d="M638 228 H734"/>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="52" y="158" width="150" height="140" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="82" y="206" fill="#ecf3ff" font-size="20" font-weight="800">Tag</text>
    <text x="82" y="236" fill="#9fb0cd" font-size="15">v0.1.0</text>
    <text x="82" y="262" fill="#9fb0cd" font-size="15">annotated</text>
    <rect x="298" y="158" width="122" height="140" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="328" y="206" fill="#ecf3ff" font-size="20" font-weight="800">Build</text>
    <text x="328" y="236" fill="#9fb0cd" font-size="15">linux</text>
    <text x="328" y="262" fill="#9fb0cd" font-size="15">darwin</text>
    <rect x="516" y="158" width="122" height="140" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="546" y="206" fill="#ecf3ff" font-size="20" font-weight="800">Ship</text>
    <text x="546" y="236" fill="#9fb0cd" font-size="15">GHCR</text>
    <text x="546" y="262" fill="#9fb0cd" font-size="15">SBOM</text>
    <rect x="734" y="158" width="190" height="140" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="764" y="206" fill="#ecf3ff" font-size="20" font-weight="800">Release</text>
    <text x="764" y="236" fill="#9fb0cd" font-size="15">assets + SHA256SUMS</text>
    <text x="764" y="262" fill="#9fb0cd" font-size="15">GitHub release notes</text>
  </g>
</svg>
