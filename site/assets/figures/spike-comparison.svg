<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Spike experiment snapshot</title>
  <desc id="desc">Sample spike evidence comparing HPA60 and Hybrid-SA phase summaries plus MPC control trace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111c35"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="52" y="64" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="30" font-weight="800">Spike response sample</text>
  <text x="52" y="94" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="16">Committed evidence paths: HPA60 target_60/spike and Hybrid-SA max70 tuned spike run.</text>
  <g filter="url(#shadow)">
    <rect x="52" y="132" width="412" height="170" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="78" y="170" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Burst phase p95 latency</text>
    <line x1="92" y1="255" x2="420" y2="255" stroke="#2d3d60" stroke-width="2"/>
    <rect x="118" y="214" width="96" height="41" rx="8" fill="#5cc8ff"/>
    <rect x="282" y="171" width="96" height="84" rx="8" fill="#ffb86b"/>
    <text x="120" y="278" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">HPA60</text>
    <text x="279" y="278" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">Hybrid-SA</text>
    <text x="124" y="204" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">85 ms</text>
    <text x="279" y="162" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">174 ms</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="516" y="132" width="412" height="170" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="542" y="170" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Hybrid-SA control summary</text>
    <text x="542" y="214" fill="#60e6a8" font-family="Arial, sans-serif" font-size="36" font-weight="800">optimal</text>
    <text x="542" y="244" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">solver status across 73 samples</text>
    <text x="724" y="214" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="36" font-weight="800">42</text>
    <text x="724" y="244" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">max replicas during burst</text>
    <text x="830" y="214" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="36" font-weight="800">6</text>
    <text x="830" y="244" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">emergency scale events</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="52" y="332" width="876" height="176" rx="22" fill="#121a2d" stroke="#283756"/>
    <text x="78" y="370" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">MPC observed demand and applied replicas</text>
    <line x1="92" y1="468" x2="892" y2="468" stroke="#2d3d60"/>
    <line x1="92" y1="408" x2="892" y2="408" stroke="#1f2b46"/>
    <polyline points="100,456 210,456 302,455 384,450 470,438 506,384 538,350 574,358 612,366 650,386 690,456 742,454 804,456 884,452" fill="none" stroke="#5cc8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="100,456 210,456 302,456 384,456 470,456 506,438 538,419 574,400 612,381 650,363 690,363 742,366 804,388 884,422" fill="none" stroke="#ff6ea8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="538" cy="350" r="6" fill="#5cc8ff"/>
    <circle cx="650" cy="363" r="6" fill="#ff6ea8"/>
    <text x="710" y="386" fill="#5cc8ff" font-family="Arial, sans-serif" font-size="15">observed RPS</text>
    <text x="710" y="414" fill="#ff6ea8" font-family="Arial, sans-serif" font-size="15">applied replicas</text>
    <text x="96" y="492" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="13">0s</text>
    <text x="500" y="492" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="13">burst</text>
    <text x="856" y="492" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="13">395s</text>
  </g>
</svg>
