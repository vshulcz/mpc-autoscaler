<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid-SA spike control trace</title>
  <desc id="desc">Tuned Hybrid-SA spike run showing burst throughput, success ratio, solver status, safety events, observed demand, and applied replicas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.54" stop-color="#0c1730"/>
      <stop offset="1" stop-color="#140d28"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172846"/>
      <stop offset="1" stop-color="#111a2d"/>
    </linearGradient>
    <linearGradient id="burst" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6ea8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff6ea8" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1080" height="640" rx="34" fill="url(#bg)"/>
  <circle cx="152" cy="80" r="205" fill="#5cc8ff" opacity="0.08"/>
  <circle cx="1002" cy="68" r="230" fill="#ff6ea8" opacity="0.08"/>

  <g font-family="Arial, sans-serif">
    <text x="58" y="72" fill="#ecf3ff" font-size="34" font-weight="800">Hybrid-SA spike control trace</text>
    <text x="58" y="104" fill="#9fb0cd" font-size="16">One curated run: controller behavior under burst load, not a one-number policy ranking.</text>
    <text x="58" y="130" fill="#60e6a8" font-size="14" font-weight="700">source: experiments/thesis-evidence/main/hybrid-sa-max70-tuned/spike/.../mpc-control-log.csv</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="58" y="166" width="216" height="118" rx="24" fill="url(#card)" stroke="#2b416b"/>
    <text x="82" y="198" fill="#9fb0cd" font-size="13" font-weight="800" letter-spacing="1.4">BURST THROUGHPUT</text>
    <text x="82" y="244" fill="#ecf3ff" font-size="40" font-weight="900">201.5</text>
    <text x="194" y="244" fill="#9fb0cd" font-size="17">rps</text>
    <text x="82" y="264" fill="#9fb0cd" font-size="13">phase 2 service rate</text>

    <rect x="306" y="166" width="216" height="118" rx="24" fill="url(#card)" stroke="#2b416b"/>
    <text x="330" y="198" fill="#9fb0cd" font-size="13" font-weight="800" letter-spacing="1.4">SUCCESS RATIO</text>
    <text x="330" y="244" fill="#60e6a8" font-size="40" font-weight="900">100%</text>
    <text x="330" y="264" fill="#9fb0cd" font-size="13">all phases completed</text>

    <rect x="554" y="166" width="216" height="118" rx="24" fill="url(#card)" stroke="#2b416b"/>
    <text x="578" y="198" fill="#9fb0cd" font-size="13" font-weight="800" letter-spacing="1.4">SOLVER STATUS</text>
    <text x="578" y="244" fill="#60e6a8" font-size="40" font-weight="900">optimal</text>
    <text x="578" y="264" fill="#9fb0cd" font-size="13">73 control samples</text>

    <rect x="802" y="166" width="216" height="118" rx="24" fill="url(#card)" stroke="#2b416b"/>
    <text x="826" y="198" fill="#9fb0cd" font-size="13" font-weight="800" letter-spacing="1.4">SAFETY SCALE-UPS</text>
    <text x="826" y="244" fill="#ecf3ff" font-size="40" font-weight="900">6</text>
    <text x="860" y="244" fill="#ffb86b" font-size="18" font-weight="800">events</text>
    <text x="826" y="264" fill="#9fb0cd" font-size="13">burst protection path</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="326" width="962" height="246" rx="28" fill="#101a2d" stroke="#2b416b"/>
    <rect x="580" y="396" width="128" height="132" rx="18" fill="url(#burst)" stroke="#ff6ea8" stroke-opacity="0.36"/>

    <g stroke="#223453" stroke-width="1">
      <line x1="130" y1="528" x2="970" y2="528"/>
      <line x1="130" y1="488" x2="970" y2="488"/>
      <line x1="130" y1="448" x2="970" y2="448"/>
      <line x1="130" y1="408" x2="970" y2="408"/>
    </g>

    <g font-family="Arial, sans-serif">
      <text x="86" y="366" fill="#ecf3ff" font-size="22" font-weight="900">Demand and replica decision shape</text>
      <text x="86" y="390" fill="#9fb0cd" font-size="14">Observed RPS rises sharply; applied replicas ramp up, then drain down after demand settles.</text>
      <text x="600" y="374" fill="#ff6ea8" font-size="14" font-weight="800">30s burst</text>
      <text x="116" y="552" fill="#9fb0cd" font-size="13">0s</text>
      <text x="574" y="552" fill="#9fb0cd" font-size="13">190s</text>
      <text x="936" y="552" fill="#9fb0cd" font-size="13">395s</text>
      <text x="94" y="532" fill="#9fb0cd" font-size="12">0</text>
      <text x="86" y="452" fill="#9fb0cd" font-size="12">100</text>
      <text x="86" y="412" fill="#9fb0cd" font-size="12">200</text>
    </g>

    <path d="M134 521 C238 521 348 521 470 521 C528 516 562 504 582 484 C596 462 608 432 626 407 C650 386 688 398 720 420 C756 446 782 486 822 510 C872 530 926 528 966 520" fill="none" stroke="#5cc8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M134 522 C270 522 406 522 512 522 C548 518 572 506 596 488 C628 464 650 438 682 419 C716 400 754 405 796 424 C850 450 908 486 966 506" fill="none" stroke="#ff6ea8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-family="Arial, sans-serif">
      <rect x="784" y="350" width="196" height="60" rx="16" fill="#0b1020" stroke="#283756"/>
      <circle cx="810" cy="373" r="6" fill="#5cc8ff"/>
      <text x="828" y="378" fill="#cfe7ff" font-size="14">observed RPS</text>
      <circle cx="810" cy="394" r="6" fill="#ff6ea8"/>
      <text x="828" y="399" fill="#ffd7e7" font-size="14">applied replicas</text>

      <circle cx="626" cy="407" r="7" fill="#5cc8ff"/>
      <rect x="532" y="422" width="184" height="32" rx="12" fill="#0b1020" stroke="#2b416b"/>
      <text x="552" y="443" fill="#5cc8ff" font-size="14" font-weight="800">189 rps peak observed</text>
      <circle cx="720" cy="420" r="7" fill="#ff6ea8"/>
      <rect x="720" y="448" width="142" height="32" rx="12" fill="#0b1020" stroke="#2b416b"/>
      <text x="740" y="469" fill="#ff6ea8" font-size="14" font-weight="800">42 max replicas</text>
    </g>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="58" y="612" fill="#9fb0cd" font-size="14">Run metrics: phase-2 p95 174 ms, p99 255 ms, max latency 403 ms. Full comparisons belong in generated benchmark reports.</text>
  </g>
</svg>
