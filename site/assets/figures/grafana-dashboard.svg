<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Toy Load Grafana dashboard preview</title>
  <desc id="desc">Dashboard preview with request rate, error rate, latency quantiles, in-flight requests, scraped targets, CPU, and memory panels.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16213a"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="980" height="560" rx="28" fill="#0b1020"/>
  <rect x="34" y="32" width="912" height="496" rx="22" fill="#0f1729" stroke="#283756" filter="url(#shadow)"/>
  <text x="62" y="74" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="26" font-weight="800">Toy Load Dashboard</text>
  <text x="62" y="102" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">Prometheus panels committed as dashboards/toy-load-dashboard.json</text>
  <g font-family="Arial, sans-serif">
    <rect x="62" y="128" width="410" height="120" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="82" y="158" fill="#ecf3ff" font-size="16" font-weight="700">Request Rate</text>
    <polyline points="82,214 142,210 196,207 254,203 304,151 356,173 438,205" fill="none" stroke="#5cc8ff" stroke-width="4" stroke-linecap="round"/>
    <rect x="508" y="128" width="376" height="120" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="528" y="158" fill="#ecf3ff" font-size="16" font-weight="700">Error Rate</text>
    <polyline points="528,214 594,214 660,214 726,214 792,214 858,214" fill="none" stroke="#60e6a8" stroke-width="4" stroke-linecap="round"/>
    <text x="528" y="207" fill="#60e6a8" font-size="28" font-weight="800">0 5xx rps</text>
    <rect x="62" y="272" width="410" height="120" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="82" y="302" fill="#ecf3ff" font-size="16" font-weight="700">Latency Quantiles</text>
    <polyline points="82,358 142,356 196,354 254,351 304,315 356,330 438,352" fill="none" stroke="#ffb86b" stroke-width="4" stroke-linecap="round"/>
    <polyline points="82,368 142,366 196,365 254,362 304,336 356,342 438,363" fill="none" stroke="#5cc8ff" stroke-width="3" stroke-linecap="round"/>
    <rect x="508" y="272" width="172" height="120" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="528" y="302" fill="#ecf3ff" font-size="16" font-weight="700">In-Flight</text>
    <text x="528" y="354" fill="#ecf3ff" font-size="38" font-weight="800">11.3</text>
    <text x="528" y="378" fill="#9fb0cd" font-size="14">burst max</text>
    <rect x="712" y="272" width="172" height="120" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="732" y="302" fill="#ecf3ff" font-size="16" font-weight="700">Scraped Targets</text>
    <text x="732" y="354" fill="#ecf3ff" font-size="38" font-weight="800">up</text>
    <text x="732" y="378" fill="#9fb0cd" font-size="14">service discovery</text>
    <rect x="62" y="416" width="410" height="76" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="82" y="446" fill="#ecf3ff" font-size="16" font-weight="700">Process CPU</text>
    <polyline points="210,464 260,456 310,446 360,439 438,454" fill="none" stroke="#ff6ea8" stroke-width="4" stroke-linecap="round"/>
    <rect x="508" y="416" width="376" height="76" rx="14" fill="url(#panel)" stroke="#273852"/>
    <text x="528" y="446" fill="#ecf3ff" font-size="16" font-weight="700">Resident Memory</text>
    <polyline points="684,464 728,462 772,461 816,459 858,458" fill="none" stroke="#60e6a8" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
