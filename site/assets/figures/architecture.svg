<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">MPC autoscaler architecture</title>
  <desc id="desc">Load profiles drive toy-load, metrics flow into HPA and MPC controllers, and analysis turns run artifacts into summaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101a33"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="1">
      <stop offset="0" stop-color="#17284a"/>
      <stop offset="1" stop-color="#122039"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5cc8ff"/>
    </marker>
  </defs>
  <rect width="980" height="520" rx="28" fill="url(#bg)"/>
  <g fill="none" stroke="#5cc8ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <path d="M180 130 C230 130 245 130 292 130"/>
    <path d="M488 130 C548 130 565 130 618 130"/>
    <path d="M735 170 C735 215 735 230 735 270"/>
    <path d="M676 330 C612 380 507 394 395 360"/>
    <path d="M320 170 C285 220 285 276 320 322"/>
    <path d="M430 330 C516 330 552 330 618 330"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="48" y="82" width="145" height="96" rx="20" fill="url(#box)" stroke="#2b416b"/>
    <text x="72" y="123" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Load</text>
    <text x="72" y="151" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">step / spike</text>
    <rect x="306" y="82" width="190" height="96" rx="20" fill="url(#box)" stroke="#2b416b"/>
    <text x="330" y="123" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">toy-load</text>
    <text x="330" y="151" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">/work + metrics</text>
    <rect x="632" y="82" width="210" height="96" rx="20" fill="url(#box)" stroke="#2b416b"/>
    <text x="656" y="123" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Prometheus</text>
    <text x="656" y="151" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">RPS, CPU, latency</text>
    <rect x="104" y="304" width="210" height="96" rx="20" fill="url(#box)" stroke="#2b416b"/>
    <text x="128" y="345" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">HPA baseline</text>
    <text x="128" y="373" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">reactive scaling</text>
    <rect x="632" y="304" width="210" height="96" rx="20" fill="url(#box)" stroke="#2b416b"/>
    <text x="656" y="345" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">MPC loop</text>
    <text x="656" y="373" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">short horizon QP</text>
    <rect x="360" y="298" width="140" height="108" rx="20" fill="#12283a" stroke="#2b6b58"/>
    <text x="385" y="341" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Scale</text>
    <text x="385" y="369" fill="#9fb0cd" font-family="Arial, sans-serif" font-size="15">replicas</text>
  </g>
  <g>
    <rect x="260" y="438" width="460" height="52" rx="18" fill="rgba(96,230,168,0.12)" stroke="#2b6b58"/>
    <text x="292" y="471" fill="#60e6a8" font-family="Arial, sans-serif" font-size="18" font-weight="700">Run artifacts -> analysis package -> figures and summaries</text>
  </g>
</svg>
