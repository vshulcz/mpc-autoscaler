name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25"
  IMAGE_REPO: ghcr.io/vshulcz/toy-load

jobs:
  build-release:
    name: Build Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'Invalid release tag: %s\n' "${TAG}" >&2
            exit 1
          fi
          printf 'tag=%s\n' "${TAG}" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Resolve release revision
        id: revision
        shell: bash
        run: |
          {
            printf 'sha=%s\n' "$(git rev-parse HEAD)"
            printf 'short_sha=%s\n' "$(git rev-parse --short=12 HEAD)"
            printf 'created=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: toy-load/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Build toy-load binaries
        shell: bash
        run: |
          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              name="toy-load-${{ steps.release.outputs.tag }}-${GOOS}-${GOARCH}"
              mkdir -p "dist/${name}"
              (
                cd toy-load
                CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
                  go build -trimpath -o "../dist/${name}/toy-load" ./cmd/toy-load
              )
              tar -C "dist/${name}" -czf "dist/${name}.tar.gz" toy-load
              rm -rf "dist/${name}"
            done
          done

      - name: Package Helm chart
        run: |
          helm package toy-load/deploy/helm/toy-load \
            --version "${{ steps.release.outputs.version }}" \
            --app-version "${{ steps.release.outputs.version }}" \
            --destination dist

      - name: Write checksums
        run: |
          shasum -a 256 dist/* > dist/SHA256SUMS

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest
            type=raw,value=sha-${{ steps.revision.outputs.short_sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./toy-load
          file: ./toy-load/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.release.outputs.tag }}
            REVISION=${{ steps.revision.outputs.sha }}
            CREATED=${{ steps.revision.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: dist/*
          body: |
            Release `${{ steps.release.outputs.tag }}`.

            Container image: `ghcr.io/vshulcz/toy-load:${{ steps.release.outputs.tag }}`
            Helm chart package and cross-platform toy-load binaries are attached below.
