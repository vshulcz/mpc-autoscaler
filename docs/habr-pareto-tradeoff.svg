<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Autoscaling cost and latency trade-off map</title>
  <desc id="desc">Scatter plot of AWS proxy cost versus worst p95 latency for HPA60, Hybrid-SA, proxy-HPA+safety and no-QP contours.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset="1" stop-color="#111827"/></linearGradient>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="90" y="90" fill="#f5f7fb" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="800">Компромисс: стоимость и p95</text>
  <text x="94" y="140" fill="#9fb4d8" font-family="Inter,Arial,sans-serif" font-size="28">левее дешевле, выше меньше p95</text>

  <g transform="translate(180 190)" font-family="Inter,Arial,sans-serif">
    <rect x="0" y="0" width="1120" height="560" fill="#0b1527" stroke="#2a3b5c" stroke-width="2"/>
    <g stroke="#263856" stroke-width="1">
      <path d="M0 112H1120M0 224H1120M0 336H1120M0 448H1120"/>
      <path d="M224 0V560M448 0V560M672 0V560M896 0V560"/>
    </g>
    <line x1="0" y1="560" x2="1120" y2="560" stroke="#c8d7f4" stroke-width="3"/>
    <line x1="0" y1="560" x2="0" y2="0" stroke="#c8d7f4" stroke-width="3"/>
    <text x="420" y="630" fill="#c8d7f4" font-size="24">AWS-оценка, $/ч</text>
    <text x="-125" y="300" fill="#c8d7f4" font-size="24" transform="rotate(-90 -125 300)">худший p95, мс</text>

    <g font-size="22" font-weight="700">
      <circle cx="46" cy="383" r="14" fill="#aeb8c8"/>
      <text x="70" y="391" fill="#cdd6e6">без QP</text>

      <circle cx="113" cy="131" r="14" fill="#7cf7d4"/>
      <text x="135" y="139" fill="#d8fff6">proxy-HPA+safety</text>

      <circle cx="158" cy="544" r="16" fill="#ff6e91"/>
      <text x="180" y="506" fill="#ffd2df">Hybrid-SA</text>
      <text x="180" y="534" fill="#ff9fbc" font-size="18">низкая стоимость, высокий p95</text>

      <circle cx="1004" cy="247" r="16" fill="#58c7ff"/>
      <text x="760" y="238" fill="#d9f5ff">HPA60</text>
      <text x="697" y="268" fill="#9fb4d8" font-size="18">выше стоимость, ниже худший p95</text>

    </g>

    <text x="16" y="598" fill="#9fb4d8" font-size="18">0.02</text>
    <text x="332" y="598" fill="#9fb4d8" font-size="18">0.05</text>
    <text x="668" y="598" fill="#9fb4d8" font-size="18">0.08</text>
    <text x="1070" y="598" fill="#9fb4d8" font-size="18">0.11</text>
    <text x="-60" y="566" fill="#9fb4d8" font-size="18">175</text>
    <text x="-60" y="318" fill="#9fb4d8" font-size="18">120</text>
    <text x="-50" y="36" fill="#9fb4d8" font-size="18">75</text>
  </g>
</svg>
