apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toy-load.fullname" . }}
  namespace: {{ include "toy-load.namespace" . }}
  labels:
    {{- include "toy-load.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "toy-load.name" . }}
  template:
    metadata:
      labels:
        {{- include "toy-load.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if not .Values.prometheusOperator.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.config.port }}"
        prometheus.io/path: "{{ .Values.config.metricsPath }}"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "toy-load.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: toy-load
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
          env:
            - name: PORT
              value: "{{ .Values.config.port }}"
            - name: METRICS_PATH
              value: "{{ .Values.config.metricsPath }}"
            - name: READ_TIMEOUT
              value: "{{ .Values.config.readTimeout }}"
            - name: WRITE_TIMEOUT
              value: "{{ .Values.config.writeTimeout }}"
            - name: IDLE_TIMEOUT
              value: "{{ .Values.config.idleTimeout }}"
            - name: MAX_HEADER_BYTES
              value: "{{ int .Values.config.maxHeaderBytes }}"
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: APP_NAME
              value: "{{ .Values.config.appName }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.config.port }}
            {{- toYaml (omit .Values.livenessProbe "path") | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.config.port }}
            {{- toYaml (omit .Values.readinessProbe "path") | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
