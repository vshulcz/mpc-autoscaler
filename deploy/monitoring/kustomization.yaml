apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: toy-monitoring

resources:
  - namespace.yaml
  - prometheus-rbac.yaml
  - prometheus.yaml
  - service.yaml
  - servicemonitor.yaml
  - grafana.yaml
  - grafana-service.yaml
  - grafana-datasource.yaml
  - grafana-dashboard.yaml

configMapGenerator:
  - name: toy-grafana-dashboards
    files:
      - toy-load-dashboard.json=dashboards/toy-load-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
