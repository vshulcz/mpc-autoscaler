apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: toy-grafana
  labels:
    app.kubernetes.io/name: toy-grafana
spec:
  version: "11.3.0"
  config:
    auth:
      disable_login_form: "true"
      disable_signout_menu: "false"
    auth.anonymous:
      enabled: "true"
      org_role: Viewer
