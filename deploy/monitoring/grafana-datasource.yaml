apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: toy-prometheus-datasource
  labels:
    app.kubernetes.io/name: toy-grafana
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: toy-grafana
  datasource:
    name: Prometheus
    type: prometheus
    uid: toy-prometheus
    access: proxy
    url: http://toy-prometheus:9090
    jsonData:
      timeInterval: 15s
      httpMethod: POST
    editable: true
    isDefault: true
