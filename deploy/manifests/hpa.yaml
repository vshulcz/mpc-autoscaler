apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: toy-load
  namespace: default
  labels:
    app: toy-load
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: toy-load
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
