apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-monitoring
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: toy-monitoring
  source:
    repoURL: https://github.com/vshulcz/mpc-autoscaler.git
    targetRevision: main
    path: deploy/monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
