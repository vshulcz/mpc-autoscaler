apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-load
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/vshulcz/mpc-autoscaler.git
    # Pin to a release tag for reproducibility. Override to `main` only for active development.
    targetRevision: v0.1.0
    path: toy-load/deploy/helm/toy-load
    helm:
      releaseName: toy-load
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: toy-load-toy-load
      namespace: default
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
